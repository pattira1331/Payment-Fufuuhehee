    <style>
        /* กำหนดให้ใช้ฟอนต์ Mitr และ Itim เป็นหลักในการแสดงผลทั้งหมด */
        body, input, button, select, textarea, span, p, h1, h2, h3, div {
            font-family: 'Mitr', 'Itim', sans-serif !important;
        }

        /* พื้นหลังผสมระหว่างไล่เฉดสี และ Polka Dot สี F4F4F4 ขนาดใหญ่ขึ้น (4px บาลานซ์ช่องไฟ 42px) */
        body {
            background-color: #FEDBAD;
            background-image: radial-gradient(#F4F4F4 4px, transparent 4px), linear-gradient(135deg, #FEDBAD 0%, #F1FDA9 100%);
            background-size: 42px 42px, 100% 100%;
            background-attachment: fixed;
            position: relative;
            padding-top: 75px; /* เว้นพื้นที่ด้านบนหลบสายตุ้งติ้ง */
            color: #7A6961;
        }
        
        /* อัปเดตความหนาของฟอนต์ให้ล้อไปกับฟอนต์ใหม่ */
        .font-light { font-family: 'Mitr', sans-serif; font-weight: 200; }
        .font-normal { font-family: 'Mitr', sans-serif; font-weight: 300; }
        .font-medium { font-family: 'Mitr', sans-serif; font-weight: 400; }
        .font-bold { font-family: 'Mitr', sans-serif; font-weight: 500; }

        /* ตัวเลข บัญชีธนาคาร และอินพุต ใช้ฟอนต์ Itim ลายมือน่ารักๆ เพื่อความซอฟต์ */
        .font-mono, #ktb-num, #feedback-input {
            font-family: 'Itim', sans-serif !important;
            letter-spacing: 0.03em;
        }

        /* เอฟเฟกต์ป๊อปคิ้วท์ๆ ด้วยรูปภาพที่ผู้ใช้กำหนดตอนคลิกเมาส์/จิ้มจอ */
        .click-pop-element {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            object-fit: contain;
            animation: popEffect 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes popEffect {
            0% {
                transform: translate(-50%, -50%) scale(0.3);
                opacity: 1;
            }
            100% {
                transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.1) rotate(var(--r));
                opacity: 0;
            }
        }

        /* แอนิเมชันสำหรับเชือกห้อยตุ้งติ้ง ดีดแกว่งเบาๆ นุ่มนวล */
        @keyframes tungTingSwingLeft {
            0%, 100% { transform: rotate(-4deg) scaleY(1); }
            50% { transform: rotate(5deg) scaleY(1.03); }
        }
        @keyframes tungTingSwingRight {
            0%, 100% { transform: rotate(4deg) scaleY(1.02); }
            50% { transform: rotate(-5deg) scaleY(0.98); }
        }
        @keyframes tungTingSwingCenter {
            0%, 100% { transform: rotate(-2deg) translateY(0px); }
            50% { transform: rotate(3deg) translateY(3px); }
        }

        .animate-ting-1 { animation: tungTingSwingLeft 3.2s ease-in-out infinite; transform-origin: top center; }
        .animate-ting-2 { animation: tungTingSwingRight 3.8s ease-in-out infinite; transform-origin: top center; }
        .animate-ting-3 { animation: tungTingSwingCenter 3.5s ease-in-out infinite; transform-origin: top center; }

        /* คลาสสร้างเส้นเชือกห้อยตุ้งติ้งแบบมินิมอล */
        .ting-line {
            width: 1.5px;
            background: dashed #7A6961;
            opacity: 0.25;
            margin: 0 auto;
        }

        /* แอนิเมชันดุ๊กดิ๊กลอยเอื่อยๆ สำหรับไอเทมกระจายทั่วเว็บ */
        @keyframes floatCute {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(15deg); }
        }
        @keyframes floatCuteReverse {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(8px) rotate(-12deg); }
        }

        .bg-float-1 { animation: floatCute 4s ease-in-out infinite; }
        .bg-float-2 { animation: floatCuteReverse 4.5s ease-in-out infinite; }
        .bg-float-3 { animation: floatCute 5s ease-in-out infinite; }
    </style>

    <script>
        let player = null;
        let isMusicPlaying = false;
        const videoId = '75-Com9Bo_s';

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'loop': 1,
                    'playlist': videoId,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(45);
        }

        function toggleMusic() {
            const btn = document.getElementById('music-toggle-btn');
            const icon = document.getElementById('music-icon');

            if (!player) return;

            if (!isMusicPlaying) {
                player.playVideo();
                isMusicPlaying = true;
                icon.className = 'fa-solid fa-music';
            } else {
                player.pauseVideo();
                isMusicPlaying = false;
                icon.className = 'fa-solid fa-music-slash';
            }
        }

        document.addEventListener('click', function startOnFirstClick() {
            if (!isMusicPlaying && player) {
                toggleMusic();
                document.removeEventListener('click', startOnFirstClick);
            }
        }, { once: true });

        // เอฟเฟกต์การจิ้มแล้วมีโบว์จิ๋วและหัวใจจิวิ๋วกระจายออกมา
        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.closest('button') || e.target.closest('a')) {
                createCuteShower(e.clientX, e.clientY, 4);
                return;
            }
            createCuteShower(e.clientX, e.clientY, 8);
        });

        function createCuteShower(pageX, pageY, count) {
            // ลิสต์รูปภาพเอฟเฟกต์ที่ผู้ใช้ต้องการให้กระจายตัว
            const customImages = [
                'https://i.postimg.cc/BQSp52cH/mi-m-ch-x-683-20260710201940.png', // โบว์ชมพู
                'https://i.postimg.cc/htx0cMKH/mi-m-ch-x-683-20260710203158.png'  // หัวใจ
            ];
            
            for (let i = 0; i < count; i++) {
                const element = document.createElement('img');
                const chosenSrc = customImages[Math.floor(Math.random() * customImages.length)];
                
                element.src = chosenSrc;
                element.className = 'click-pop-element';
                
                // สุ่มขนาดให้ลื่นไหลเป็นธรรมชาติ (สุ่มระหว่าง 14px ถึง 24px)
                const size = (Math.random() * 10 + 14);
                element.style.width = size + 'px';
                element.style.height = size + 'px';
                
                element.style.left = pageX + 'px';
                element.style.top = pageY + 'px';

                // สุ่มทิศทางการเด้งตัวกระจายออกรอบๆ
                const moveX = (Math.random() - 0.5) * 160;
                const moveY = (Math.random() - 0.5) * 160 - 30;
                const rotate = (Math.random() - 0.5) * 360;

                element.style.setProperty('--x', moveX + 'px');
                element.style.setProperty('--y', moveY + 'px');
                element.style.setProperty('--r', rotate + 'deg');

                document.body.appendChild(element);

                // ลบอิลิเมนต์ทิ้งเมื่อจบแอนิเมชัน
                setTimeout(() => {
                    element.remove();
                }, 800);
            }
        }

        function copyNumber(elementId, textId) {
            const numText = document.getElementById(elementId).innerText.replace(/-/g, '');

            navigator.clipboard.writeText(numText).then(() => {
                const copyText = document.getElementById(textId);
                const oldText = copyText.innerText;

                copyText.innerText = "คัดลอกแล้ว";
                copyText.style.color = "#7A6961";
                copyText.style.backgroundColor = "#FACA89";

                setTimeout(() => {
                    copyText.innerText = oldText;
                    copyText.style.color = "";
                    copyText.style.backgroundColor = "";
                }, 2000);
            }).catch(err => {
                alert('กรุณาเลือกคัดลอกด้วยตัวเองนะคะ');
            });
        }

        async function saveImageFromUrl(imageUrl, defaultName, buttonElement) {
            const originalText = buttonElement ? buttonElement.innerHTML : null;
            if (buttonElement) {
                buttonElement.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> กำลังบันทึก...`;
                buttonElement.disabled = true;
            }

            try {
                const response = await fetch(imageUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const blob = await response.blob();
                
                const reader = new FileReader();
                reader.onloadend = function() {
                    const dataUrl = reader.result;
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = defaultName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    if (buttonElement) {
                        buttonElement.innerHTML = originalText;
                        buttonElement.disabled = false;
                    }
                };
                reader.readAsDataURL(blob);

            } catch (error) {
                window.open(imageUrl, '_blank');
                if (buttonElement) {
                    buttonElement.innerHTML = originalText;
                    buttonElement.disabled = false;
                }
            }
        }

        function downloadBanner() {
            const bannerImg = document.getElementById('banner-image');
            const btn = document.querySelector('button[onclick="downloadBanner()"]');
            saveImageFromUrl(bannerImg.src, 'shop-account-banner.png', btn);
        }
    </script>
