    <style>
        /* กำหนดให้ใช้ฟอนต์ Mitr และ Itim เป็นหลักในการแสดงผลทั้งหมด */
        body, input, button, select, textarea, span, p, h1, h2, h3, div {
            font-family: 'Mitr', 'Itim', sans-serif !important;
        }

        body {
            background-color: #fcfcf4;

        /* อัปเดตความหนาของฟอนต์ให้ล้อไปกับฟอนต์ใหม่ */
        .font-light { font-family: 'Mitr', sans-serif; font-weight: 200; }
        .font-normal { font-family: 'Mitr', sans-serif; font-weight: 300; }
        .font-medium { font-family: 'Mitr', sans-serif; font-weight: 400; }
        .font-bold { font-family: 'Mitr', sans-serif; font-weight: 500; }

        /* ตัวเลข บัญชีธนาคาร และอินพุต ใช้ฟอนต์ Itim ลายมือน่ารักๆ เพื่อความซอฟต์ */
        .font-mono, #ktb-num, #feedback-input {
            font-family: 'Itim', sans-serif !important;
            letter-spacing: 0.03em;
        }

        @keyframes cloudFloatSide {
            0%, 100% { transform: translateX(0px) translateY(0px); }
            50% { transform: translateX(15px) translateY(-8px); }
        }
        .bg-cloud-left { animation: cloudFloatSide 6s ease-in-out infinite; }
        .bg-cloud-right { animation: cloudFloatSide 7s ease-in-out infinite 1s; }

        @keyframes float1 {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(8deg); }
        }
        @keyframes float2 {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(-6deg); }
        }
        @keyframes float3 {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.08); }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes bounceSlow {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        
        .cute-float-1 { animation: float1 4.5s ease-in-out infinite; }
        .cute-float-2 { animation: float2 3.5s ease-in-out infinite; }
        .cute-float-3 { animation: float3 4s ease-in-out infinite; }
        .cute-wiggle { animation: wiggle 2.5s ease-in-out infinite; }
        .cute-bounce { animation: bounceSlow 2.2s ease-in-out infinite; }

        .click-pop-element {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: popEffect 0.8s ease-out forwards;
        }
        @keyframes popEffect {
            0% {
                transform: translate(-50%, -50%) scale(0.4);
                opacity: 1;
            }
            100% {
                transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.2) rotate(var(--r));
                opacity: 0;
            }
        }

        .falling-star {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 9998;
            animation: starFall linear forwards;
        }
        @keyframes starFall {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.8);
                opacity: 0;
            }
            15% { opacity: var(--max-opacity, 0.7); }
            85% { opacity: var(--max-opacity, 0.7); }
            100% {
                transform: translateY(105vh) rotate(360deg) scale(0.6);
                opacity: 0;
            }
        }

        /* เอฟเฟกต์การเต้นของปุ่มเครื่องดนตรีเวลาเพลงเล่น */
        @keyframes musicPulse {

            50% { transform: scale(1.1); }
        }
        .music-playing {
            animation: musicPulse 1.5s ease-in-out infinite;
        }

    <script>
        let player = null;
        let isMusicPlaying = false;
        const videoId = '75-Com9Bo_s';

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'loop': 1,
                    'playlist': videoId,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(45);
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                startMusicVisualizer();
            } else {
                stopMusicVisualizer();
            }
        }

        let visualizerInterval = null;
        function startMusicVisualizer() {
            if (visualizerInterval) clearInterval(visualizerInterval);
            visualizerInterval = setInterval(() => {
                if (isMusicPlaying) {
                    createFloatingMusicNote();
                }
            }, 1800);
        }

        function stopMusicVisualizer() {
            if (visualizerInterval) {
                clearInterval(visualizerInterval);
                visualizerInterval = null;
            }
        }

        function toggleMusic() {
            const btn = document.getElementById('music-toggle-btn');
            const icon = document.getElementById('music-icon');

            if (!player) return;

            if (!isMusicPlaying) {
                player.playVideo();
                isMusicPlaying = true;
                icon.className = 'fa-solid fa-music';
                btn.classList.add('music-playing');
            } else {
                player.pauseVideo();
                isMusicPlaying = false;
                icon.className = 'fa-solid fa-music-slash';
                btn.classList.remove('music-playing');
                stopMusicVisualizer();
            }
        }

        function createFloatingMusicNote() {
            const note = document.createElement('i');
            const notes = ['fa-music', 'fa-eighth-note', 'fa-music']; 
            note.className = `fa-solid ${notes[Math.floor(Math.random() * notes.length)]} falling-star`;
            
            note.style.color = '#7A6961';
            note.style.fontSize = (Math.random() * 12 + 10) + 'px';
            note.style.left = (Math.random() * 90 + 5) + 'vw';
            note.style.top = '100vh'; 

            const duration = Math.random() * 2.5 + 3;
            note.style.animation = `starFall ${duration}s linear forwards`;
            note.style.transform = 'translateY(0)';
            note.style.setProperty('--max-opacity', '0.6');
            
            document.body.appendChild(note);
            
            note.animate([
                { transform: 'translateY(0) scale(0.8) rotate(0deg)', opacity: 0 },
                { opacity: 0.6, offset: 0.2 },
                { transform: 'translateY(-105vh) scale(1.1) rotate(360deg)', opacity: 0 }
            ], {
                duration: duration * 1000,
                easing: 'linear'
            });

            setTimeout(() => {
                note.remove();
            }, duration * 1000);
        }

        document.addEventListener('click', function startOnFirstClick() {
            if (!isMusicPlaying && player) {
                toggleMusic();
                document.removeEventListener('click', startOnFirstClick);
            }
        }, { once: true });

        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.closest('button') || e.target.closest('a')) {
                createCuteShower(e.clientX, e.clientY, 4);
                return;
            }
            createCuteShower(e.clientX, e.clientY, 8);
        });

        function createCuteShower(pageX, pageY, count) {
            const icons = ['fa-heart', 'fa-cookie', 'fa-mug-hot', 'fa-sparkles', 'fa-ice-cream', 'fa-donut', 'fa-music', 'fa-eighth-note'];
            
            for (let i = 0; i < count; i++) {
                const element = document.createElement('i');
                const chosenIcon = icons[Math.floor(Math.random() * icons.length)];
                
                if (chosenIcon === 'fa-heart') {
                    element.className = 'fa-solid fa-heart click-pop-element';
                } else if (chosenIcon === 'fa-cookie') {
                    element.className = 'fa-solid fa-cookie click-pop-element';
                } else if (chosenIcon === 'fa-mug-hot') {
                    element.className = 'fa-solid fa-mug-hot click-pop-element';
                } else if (chosenIcon === 'fa-ice-cream') {
                    element.className = 'fa-solid fa-ice-cream click-pop-element';
                } else if (chosenIcon === 'fa-donut') {
                    element.className = 'fa-solid fa-donut click-pop-element';
                } else if (chosenIcon === 'fa-music') {
                    element.className = 'fa-solid fa-music click-pop-element';
                } else if (chosenIcon === 'fa-eighth-note') {
                    element.className = 'fa-solid fa-eighth-note click-pop-element';
                } else {
                    element.className = 'fa-solid fa-wand-magic-sparkles click-pop-element';
                }

                element.style.color = '#7A6961';
                element.style.fontSize = (Math.random() * 12 + 8) + 'px';
                element.style.left = pageX + 'px';
                element.style.top = pageY + 'px';

                const moveX = (Math.random() - 0.5) * 170;
                const moveY = (Math.random() - 0.5) * 170 - 40;
                const rotate = (Math.random() - 0.5) * 360;

                element.style.setProperty('--x', moveX + 'px');
                element.style.setProperty('--y', moveY + 'px');
                element.style.setProperty('--r', rotate + 'deg');

                document.body.appendChild(element);

                setTimeout(() => {
                    element.remove();
                }, 800);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            for (let i = 0; i < 15; i++) {
                createSingleFallingStar(true);
            }

            setInterval(() => {
                createSingleFallingStar(false);
            }, 350);
        });

        function createSingleFallingStar(isInitialLoad) {
            const star = document.createElement('i');
            const items = ['fa-star', 'fa-star', 'fa-wand-magic-sparkles', 'fa-sparkles', 'fa-cookie-bite', 'fa-cake-slice', 'fa-music'];
            const chosenIcon = items[Math.floor(Math.random() * items.length)];

            if (chosenIcon === 'fa-sparkles') {
                star.className = 'fa-solid fa-asterisk falling-star';
            } else if (chosenIcon === 'fa-wand-magic-sparkles') {
                star.className = 'fa-solid fa-wand-magic-sparkles falling-star';
            } else if (chosenIcon === 'fa-cookie-bite') {
                star.className = 'fa-solid fa-cookie-bite falling-star';
            } else if (chosenIcon === 'fa-cake-slice') {
                star.className = 'fa-solid fa-cake-slice falling-star';
            } else if (chosenIcon === 'fa-music') {
                star.className = 'fa-solid fa-music falling-star';
            } else {
                star.className = 'fa-solid fa-star falling-star';
            }

            star.style.color = '#7A6961';

            const maxOpacity = Math.random() * 0.4 + 0.4;
            star.style.setProperty('--max-opacity', maxOpacity);

            star.style.fontSize = (Math.random() * 10 + 6) + 'px';
            star.style.left = (Math.random() * 100) + 'vw';

            const duration = Math.random() * 3 + 4;
            star.style.animationDuration = duration + 's';

            if (isInitialLoad) {
                star.style.top = (Math.random() * 80) + 'vh';
            }

            document.body.appendChild(star);

            setTimeout(() => {
                star.remove();
            }, duration * 1000);
        }

        function copyNumber(elementId, textId) {
            const numText = document.getElementById(elementId).innerText.replace(/-/g, '');

            navigator.clipboard.writeText(numText).then(() => {
                const copyText = document.getElementById(textId);
                const oldText = copyText.innerText;

                copyText.innerText = "คัดลอกแล้ว";
                copyText.style.color = "#7A6961";
                copyText.style.backgroundColor = "#FACA89";

                setTimeout(() => {
                    copyText.innerText = oldText;
                    copyText.style.color = "";
                    copyText.style.backgroundColor = "";
                }, 2000);
            }).catch(err => {
                alert('กรุณาเลือกคัดลอกด้วยตัวเองนะคะ');
            });
        }

        async function saveImageFromUrl(imageUrl, defaultName, buttonElement) {
            const originalText = buttonElement ? buttonElement.innerHTML : null;
            if (buttonElement) {
                buttonElement.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> กำลังบันทึก...`;
                buttonElement.disabled = true;
            }

            try {
                const response = await fetch(imageUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const blob = await response.blob();
                
                const reader = new FileReader();
                reader.onloadend = function() {
                    const dataUrl = reader.result;
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = defaultName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    if (buttonElement) {
                        buttonElement.innerHTML = originalText;
                        buttonElement.disabled = false;
                    }
                };
                reader.readAsDataURL(blob);

            } catch (error) {
                window.open(imageUrl, '_blank');
                if (buttonElement) {
                    buttonElement.innerHTML = originalText;
                    buttonElement.disabled = false;
                }
            }
        }

        function downloadBanner() {
            const bannerImg = document.getElementById('banner-image');
            const btn = document.querySelector('button[onclick="downloadBanner()"]');
            saveImageFromUrl(bannerImg.src, 'shop-account-banner.png', btn);
        }
    </script>
